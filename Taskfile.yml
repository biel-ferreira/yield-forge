# YieldForge — cross-platform task runner (https://taskfile.dev).
# Usage: `task <name>`. Run `task` with no arguments to list available tasks.

version: '3'

vars:
  BINARY: yield-forge
  COMPOSE: deploy/docker-compose.yml

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  run:
    desc: Run the API locally
    cmds:
      - go run ./cmd/api

  build:
    desc: Build the API binary into bin/
    cmds:
      - go build -o bin/{{.BINARY}}{{if eq OS "windows"}}.exe{{end}} ./cmd/api

  test:
    desc: Run all tests with coverage
    cmds:
      - go test ./... -cover

  test:short:
    desc: Run unit tests only (skip the socket-based integration tests)
    cmds:
      - go test ./... -short

  fmt:
    desc: Format all Go code
    cmds:
      - gofmt -w .

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  lint:
    desc: Static analysis (go vet + golangci-lint if installed)
    cmds:
      - go vet ./...
      - command -v golangci-lint >/dev/null 2>&1 && golangci-lint run || echo "golangci-lint not installed; ran go vet only"

  docker-up:
    desc: Build and run the stack via docker compose
    cmds:
      - docker compose -f {{.COMPOSE}} up --build

  docker-down:
    desc: Stop and remove the docker compose stack
    cmds:
      - docker compose -f {{.COMPOSE}} down
