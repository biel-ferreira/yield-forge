# YieldForge — local development stack.
# Run from the repo root:
#   docker compose -f deploy/docker-compose.yml up --build      (or: make docker-up)

name: yield-forge

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        VERSION: dev
        COMMIT: local
        BUILD_TIME: unknown
    image: yield-forge:dev
    ports:
      - "8080:8080"
    environment:
      APP_ENV: dev
      APP_PORT: "8080"
      LOG_LEVEL: info
      LOG_FORMAT: json
      # DATABASE_URL is added in SPEC-002, pointing at the db service below, e.g.:
      # DATABASE_URL: postgres://yieldforge:yieldforge@db:5432/yieldforge_dev?sslmode=disable
    restart: unless-stopped
    # Enabled in SPEC-002, once the db service below is active:
    # depends_on:
    #   db:
    #     condition: service_healthy

