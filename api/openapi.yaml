# YieldForge HTTP API — OpenAPI 3.1 contract.
#
# This file is the hand-maintained source of truth for the API surface. It is embedded
# into the binary (api/api.go) and served at GET /openapi.yaml + rendered at GET /docs.
#
# FORMATTING CONTRACT (load-bearing — do not reflow):
#   The drift test (internal/transport/http/openapi_test.go) parses the `paths:` block
#   by indentation rather than with a YAML library (stdlib-first, ADR-0003). Therefore:
#     * each path key is indented EXACTLY two spaces  ("  /profile:")
#     * each operation/method key EXACTLY four spaces  ("    get:")
#     * path templating uses the ServeMux style "{id}" so keys match the router verbatim
#   Keep new endpoints in that shape or the drift guard will misparse them.
#
# CONVENTIONS:
#   * Money is integer minor units (centavos); rates are integer basis points (bps).
#     They cross the wire as JSON integers (format int64), NEVER floats.
#   * Auth is a server-side session in an HttpOnly cookie (see securitySchemes).
#   * Errors use the generic envelope {"error":"..."}.
openapi: 3.1.0
info:
  title: YieldForge API
  version: 0.1.0
  description: |-
    AI-powered Investment Copilot for Brazilian retail investors (FIIs + Fixed Income).

    **Money & rates:** monetary amounts are integer **centavos** (`*_centavos`) and
    rates are integer **basis points** (`*_bps`, 1 bp = 0.01%). They are always JSON
    integers, never floating-point.

    **Auth:** all routes are deny-by-default and require a valid session cookie except
    the public allowlist (`/healthz`, `/readyz`, `/version`, `POST /auth/register`,
    `POST /auth/login`). Identity is taken from the session, never from the request body.
  license:
    name: Proprietary
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: system
    description: Liveness, readiness, and build metadata.
  - name: auth
    description: Registration, sessions, and the authenticated identity.
  - name: profile
    description: The investor profile (risk, objectives, horizon).
  - name: holdings
    description: Portfolio holdings — FIIs and fixed income (per-user, ownership-scoped).
paths:
  /healthz:
    get:
      tags: [system]
      summary: Liveness probe
      description: Returns 200 as long as the process is serving. Always public.
      operationId: getHealthz
      security: []
      responses:
        "200":
          description: The process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
              example:
                status: ok
  /readyz:
    get:
      tags: [system]
      summary: Readiness probe
      description: 200 when the database is reachable, 503 otherwise. Always public.
      operationId: getReadyz
      security: []
      responses:
        "200":
          description: The app and its dependencies are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              example:
                status: ready
                checks:
                  db: up
        "503":
          description: A dependency is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
              example:
                status: not_ready
                checks:
                  db: down
  /version:
    get:
      tags: [system]
      summary: Build metadata
      operationId: getVersion
      security: []
      responses:
        "200":
          description: Build version, commit, and build time.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
  /auth/register:
    post:
      tags: [auth]
      summary: Create an account
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Credentials"
      responses:
        "201":
          description: Account created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: The email is already registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: email already registered
  /auth/login:
    post:
      tags: [auth]
      summary: Start a session
      description: Verifies credentials and sets an HttpOnly session cookie.
      operationId: loginUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Credentials"
      responses:
        "200":
          description: Authenticated. A session cookie is set.
          headers:
            Set-Cookie:
              description: The HttpOnly session cookie (name defaults to `yf_session`).
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid email or password.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: invalid email or password
  /auth/logout:
    post:
      tags: [auth]
      summary: Revoke the current session
      operationId: logoutUser
      responses:
        "204":
          description: Session revoked; the cookie is cleared.
        "401":
          $ref: "#/components/responses/Unauthorized"
  /auth/me:
    get:
      tags: [auth]
      summary: The authenticated caller's identity
      operationId: getCurrentUser
      responses:
        "200":
          description: The current user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /profile:
    get:
      tags: [profile]
      summary: Get the caller's investor profile
      operationId: getProfile
      responses:
        "200":
          description: The investor profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: The profile has not been set.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: profile not set
    put:
      tags: [profile]
      summary: Create or replace the caller's investor profile
      operationId: setProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileRequest"
      responses:
        "200":
          description: The saved profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /holdings/fii:
    get:
      tags: [holdings]
      summary: List the caller's FII holdings
      operationId: listFIIHoldings
      responses:
        "200":
          description: The caller's FII holdings (possibly empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FIIHoldingResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [holdings]
      summary: Create an FII holding
      operationId: createFIIHolding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FIIHoldingRequest"
      responses:
        "201":
          description: The created holding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FIIHoldingResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /holdings/fii/{id}:
    put:
      tags: [holdings]
      summary: Update an owned FII holding
      operationId: updateFIIHolding
      parameters:
        - $ref: "#/components/parameters/HoldingID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FIIHoldingRequest"
      responses:
        "200":
          description: The updated holding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FIIHoldingResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/HoldingNotFound"
    delete:
      tags: [holdings]
      summary: Delete an owned FII holding
      operationId: deleteFIIHolding
      parameters:
        - $ref: "#/components/parameters/HoldingID"
      responses:
        "204":
          description: Deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/HoldingNotFound"
  /holdings/fixed-income:
    get:
      tags: [holdings]
      summary: List the caller's fixed-income holdings
      operationId: listFixedIncomeHoldings
      responses:
        "200":
          description: The caller's fixed-income holdings (possibly empty).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FixedIncomeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [holdings]
      summary: Create a fixed-income holding
      operationId: createFixedIncomeHolding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FixedIncomeRequest"
      responses:
        "201":
          description: The created holding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FixedIncomeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /holdings/fixed-income/{id}:
    put:
      tags: [holdings]
      summary: Update an owned fixed-income holding
      operationId: updateFixedIncomeHolding
      parameters:
        - $ref: "#/components/parameters/HoldingID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FixedIncomeRequest"
      responses:
        "200":
          description: The updated holding.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FixedIncomeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/HoldingNotFound"
    delete:
      tags: [holdings]
      summary: Delete an owned fixed-income holding
      operationId: deleteFixedIncomeHolding
      parameters:
        - $ref: "#/components/parameters/HoldingID"
      responses:
        "204":
          description: Deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/HoldingNotFound"
  /dashboard:
    get:
      tags: [dashboard]
      summary: Compute the caller's portfolio dashboard (summary, allocation, sector exposure)
      operationId: getDashboard
      description: |-
        Read-only computed view over the caller's holdings and the latest market data.
        Money is integer centavos and shares integer basis points (never a float); a held
        FII with no current quote is valued at cost basis and listed in `stale_tickers`.
      responses:
        "200":
          description: The computed dashboard.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /insights:
    get:
      tags: [insights]
      summary: Generate the caller's explainable portfolio insights
      operationId: getInsights
      description: |-
        AI insights across categories (portfolio, allocation, market_context), grounded in
        computed facts and emitted only through the gated Insighter — every insight carries an
        explanation (FR-013) and never a transaction order (FR-014); the response carries the
        non-advice disclaimer. `available` is false when the LLM was fully unavailable; an empty
        portfolio returns `available:true` with no insights.
      responses:
        "200":
          description: The generated insights (possibly empty / degraded — see `available`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /rebalancing:
    post:
      tags: [rebalancing]
      summary: Generate explainable contribution guidance (areas, computed split, candidates)
      operationId: postRebalancing
      description: |-
        Given a contribution amount, suggest where to focus the new money: areas (each with a
        deterministically computed `suggested_share_bps`, summing to 10000), with grounded named
        FII candidates nested inside the FII area. The percentages are computed, not generated; the
        gated Insighter only explains them — every area/candidate carries an explanation (FR-013)
        and never a transaction order (FR-014); the response carries the non-advice disclaimer.
        `available` is false on a full LLM outage. `include_asset_shares` opts into an illustrative
        per-candidate share. Money is integer centavos; never a float.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contribution_centavos:
                  type: integer
                  format: int64
                  description: The amount to allocate, in centavos (> 0).
                include_asset_shares:
                  type: boolean
                  description: Opt into the illustrative per-candidate within-area share (default false).
              required: [contribution_centavos]
      responses:
        "200":
          description: The generated guidance (possibly degraded — see `available`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RebalancingResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /health-score:
    get:
      tags: [health-score]
      summary: Compute the caller's reproducible Portfolio Health Score
      operationId: getHealthScore
      description: |-
        A 0–100 health score with a per-factor breakdown (diversification, concentration, liquidity,
        goal_alignment, risk_exposure). The score and breakdown are COMPUTED, not LLM-generated, and
        reproducible — same inputs (portfolio, profile, macro) yield the same score and identical
        breakdown; the score is market-aware (macro is an input). An optional gated AI narrative
        explains the result using the live market and never changes the number — `narrative_available`
        is false on an LLM outage. Scores and weights are integers; never a float.
      responses:
        "200":
          description: The computed score + breakdown (+ narrative when available).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthScoreResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /projections:
    get:
      tags: [projections]
      summary: Compute the caller's income & net-worth projections
      operationId: getProjections
      description: |-
        Two deterministic, reproducible projections over the current portfolio: a passive-income
        projection (monthly/annual, three scenarios) and a net-worth projection (value over the
        horizon from current value + reinvested income + the monthly contribution, three scenarios,
        as yearly points for charting). Figures are computed, not LLM-generated; each scenario shows
        its assumptions; the response is a labelled estimate, never a transaction order. Money is
        integer centavos; never a float.
      parameters:
        - name: monthly_contribution_centavos
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 0
            default: 0
          description: New money contributed each month, in centavos (≥ 0).
        - name: horizon_years
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 40
            default: 10
          description: Projection horizon in years (1–40).
      responses:
        "200":
          description: The computed income + net-worth projections.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectionsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /chat/messages:
    post:
      tags: [chat]
      summary: Send a conversational-copilot turn (create or continue a thread)
      operationId: postChatMessage
      description: |-
        A multi-turn, fact-grounded chat turn. Omit `thread_id` to start a new thread, or supply one
        to continue it. Every reply is grounded in the user's computed facts and emitted only through
        the gated Insighter — it carries an `explanation` and the non-advice `disclaimer`, never a
        transaction order (FR-013/FR-014). `available` is false when the copilot was temporarily
        unavailable (the turn is not persisted; the thread stays readable). Identity is from the
        session; the content is length-bounded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                thread_id:
                  type: string
                  description: Optional — omit to start a new thread.
                content:
                  type: string
                  description: The user's message (1–2000 characters).
              required: [content]
      responses:
        "200":
          description: The gated assistant reply (possibly degraded — see `available`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatReplyResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /chat/threads:
    get:
      tags: [chat]
      summary: List the caller's conversation threads
      operationId: listChatThreads
      responses:
        "200":
          description: The caller's threads, most-recently-updated first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatThreadResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [chat]
      summary: Clear all the caller's conversation history
      operationId: clearChatThreads
      responses:
        "204":
          description: All threads cleared.
        "401":
          $ref: "#/components/responses/Unauthorized"
  /chat/threads/{id}:
    get:
      tags: [chat]
      summary: Read a thread and its messages
      operationId: getChatThread
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The thread and its ordered messages.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatThreadDetailResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [chat]
      summary: Delete a thread and its messages
      operationId: deleteChatThread
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: The thread was deleted (or did not exist — no existence oracle).
        "401":
          $ref: "#/components/responses/Unauthorized"
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: yf_session
      description: |-
        Server-side session token in an HttpOnly cookie, issued by `POST /auth/login`.
        The cookie name is configurable via `AUTH_COOKIE_NAME` (default `yf_session`).
  parameters:
    HoldingID:
      name: id
      in: path
      required: true
      description: The holding's UUID.
      schema:
        type: string
        format: uuid
  responses:
    BadRequest:
      description: The request body or a field is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: invalid request body
    Unauthorized:
      description: Authentication is required or the session is invalid.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: authentication required
    HoldingNotFound:
      description: No such holding owned by the caller.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: holding not found
    NotFound:
      description: No such resource owned by the caller.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: thread not found
  schemas:
    Error:
      type: object
      description: The generic error envelope used by all 4xx/5xx responses.
      properties:
        error:
          type: string
      required: [error]
    StatusResponse:
      type: object
      properties:
        status:
          type: string
      required: [status]
    ReadinessResponse:
      type: object
      properties:
        status:
          type: string
          examples: [ready, not_ready]
        checks:
          type: object
          additionalProperties:
            type: string
          description: Per-dependency status (e.g. `{"db":"up"}`).
      required: [status, checks]
    VersionResponse:
      type: object
      properties:
        version:
          type: string
        commit:
          type: string
        built_at:
          type: string
      required: [version, commit, built_at]
    Credentials:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
      required: [email, password]
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
      required: [id, email]
    ProfileRequest:
      type: object
      description: There is deliberately no `user_id` field — identity comes from the session.
      properties:
        risk_profile:
          type: string
          enum: [conservative, moderate, aggressive]
        objectives:
          type: array
          minItems: 1
          items:
            type: string
            enum: [retirement, passive_income, wealth_preservation, long_term_growth]
        horizon_years:
          type: integer
          minimum: 1
          maximum: 50
      required: [risk_profile, objectives, horizon_years]
    ProfileResponse:
      type: object
      properties:
        risk_profile:
          type: string
          enum: [conservative, moderate, aggressive]
        objectives:
          type: array
          items:
            type: string
            enum: [retirement, passive_income, wealth_preservation, long_term_growth]
        horizon_years:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [risk_profile, objectives, horizon_years, created_at, updated_at]
    FIIHoldingRequest:
      type: object
      properties:
        ticker:
          type: string
          description: The FII ticker (e.g. `HGLG11`).
          example: HGLG11
        quantity:
          type: integer
          minimum: 1
          description: Number of cotas (positive whole number).
        average_price_centavos:
          type: integer
          format: int64
          minimum: 0
          description: Average cost per cota, in centavos (integer, never a float).
      required: [ticker, quantity, average_price_centavos]
    FIIHoldingResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ticker:
          type: string
        quantity:
          type: integer
        average_price_centavos:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, ticker, quantity, average_price_centavos, created_at, updated_at]
    ChatMessage:
      type: object
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        explanation:
          type: string
          description: Present on assistant messages — the explainability gate guarantees it (FR-013).
        created_at:
          type: string
          format: date-time
      required: [id, role, content, created_at]
    ChatThreadResponse:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, title, created_at, updated_at]
    ChatThreadDetailResponse:
      type: object
      properties:
        thread:
          $ref: "#/components/schemas/ChatThreadResponse"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required: [thread, messages]
    ChatReplyResponse:
      type: object
      description: The gated assistant reply to a chat turn.
      properties:
        thread_id:
          type: string
        message:
          $ref: "#/components/schemas/ChatMessage"
        disclaimer:
          type: string
          description: The non-advice disclaimer (FR-014).
        available:
          type: boolean
          description: False when the copilot was temporarily unavailable (turn not persisted).
      required: [thread_id, message, disclaimer, available]
    InsightsResponse:
      type: object
      description: AI insights aggregated across categories, with the non-advice disclaimer.
      properties:
        insights:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
                enum: [portfolio, allocation, market_context]
              title:
                type: string
              detail:
                type: string
              explanation:
                type: string
                description: Always present — the explainability gate (FR-013) guarantees it.
            required: [category, title, detail, explanation]
        disclaimer:
          type: string
          description: The non-advice disclaimer (FR-014).
        available:
          type: boolean
          description: False when the LLM was fully unavailable (insights empty).
      required: [insights, disclaimer, available]
    ProjectionsResponse:
      type: object
      description: Deterministic passive-income and net-worth projections across three scenarios.
      properties:
        income:
          type: array
          items:
            type: object
            properties:
              scenario:
                type: string
                enum: [pessimistic, base, optimistic]
              monthly_centavos:
                type: integer
                format: int64
              annual_centavos:
                type: integer
                format: int64
              assumptions:
                type: object
                properties:
                  yield_adj_bps:
                    type: integer
                  note:
                    type: string
                required: [yield_adj_bps, note]
            required: [scenario, monthly_centavos, annual_centavos, assumptions]
        net_worth:
          type: array
          items:
            type: object
            properties:
              scenario:
                type: string
                enum: [pessimistic, base, optimistic]
              points:
                type: array
                description: Yearly points (year 0 = current value) for charting.
                items:
                  type: object
                  properties:
                    year:
                      type: integer
                    value_centavos:
                      type: integer
                      format: int64
                  required: [year, value_centavos]
              assumptions:
                type: object
                properties:
                  yield_adj_bps:
                    type: integer
                  monthly_contribution_centavos:
                    type: integer
                    format: int64
                  horizon_years:
                    type: integer
                  note:
                    type: string
                required: [yield_adj_bps, monthly_contribution_centavos, horizon_years, note]
            required: [scenario, points, assumptions]
        disclaimer:
          type: string
          description: Labels the projection a non-guaranteed estimate (FR-014).
      required: [income, net_worth, disclaimer]
    HealthScoreResponse:
      type: object
      description: A reproducible 0–100 Portfolio Health Score with a per-factor breakdown.
      properties:
        score:
          type: integer
          description: 0–100, computed (never LLM-generated), reproducible.
        factors:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                enum: [diversification, concentration, liquidity, goal_alignment, risk_exposure]
              score:
                type: integer
                description: The factor sub-score, 0–100.
              weight_bps:
                type: integer
                description: The factor weight, basis points (factors sum to 10000).
              explanation:
                type: string
                description: Computed, reproducible — identical for identical inputs (FR-1062).
            required: [name, score, weight_bps, explanation]
        narrative:
          type: string
          description: Optional gated AI narrative; empty when unavailable.
        narrative_available:
          type: boolean
          description: False on a full LLM outage (the score + breakdown are always present).
        disclaimer:
          type: string
          description: The non-advice disclaimer accompanying the narrative (FR-014).
      required: [score, factors, narrative, narrative_available, disclaimer]
    RebalancingResponse:
      type: object
      description: Contribution guidance — areas with a computed split + grounded candidates.
      properties:
        areas:
          type: array
          items:
            type: object
            properties:
              class:
                type: string
                enum: [fii, fixed_income]
              suggested_share_bps:
                type: integer
                description: Computed share of the contribution, basis points (areas sum to 10000).
              suggested_amount_centavos:
                type: integer
                format: int64
              title:
                type: string
              detail:
                type: string
              explanation:
                type: string
                description: Always present — the explainability gate (FR-013) guarantees it.
              candidates:
                type: array
                description: Grounded named candidates (FII area only); each a consideration, never an order.
                items:
                  type: object
                  properties:
                    ticker:
                      type: string
                    sector:
                      type: string
                    title:
                      type: string
                    detail:
                      type: string
                    explanation:
                      type: string
                    illustrative_share_bps:
                      type: integer
                      description: Present only when include_asset_shares was requested.
                  required: [ticker, sector, title, detail, explanation]
            required: [class, suggested_share_bps, suggested_amount_centavos, title, detail, explanation, candidates]
        disclaimer:
          type: string
          description: The non-advice disclaimer (FR-014).
        available:
          type: boolean
          description: False when the LLM was fully unavailable (areas empty).
      required: [areas, disclaimer, available]
    DashboardResponse:
      type: object
      description: Computed portfolio dashboard. All money is integer centavos; all shares are basis points.
      properties:
        summary:
          type: object
          properties:
            total_invested_centavos:
              type: integer
              format: int64
            current_value_centavos:
              type: integer
              format: int64
              description: The full patrimony / net worth — the sum of every holding's current value.
            monthly_income_centavos:
              type: integer
              format: int64
            growth_centavos:
              type: integer
              format: int64
            growth_bps:
              type: integer
          required: [total_invested_centavos, current_value_centavos, monthly_income_centavos, growth_centavos, growth_bps]
        allocation:
          type: array
          description: Current-value share per asset class (fii, fixed_income, stocks, etfs).
          items:
            type: object
            properties:
              asset_class:
                type: string
                enum: [fii, fixed_income, stocks, etfs]
              value_centavos:
                type: integer
                format: int64
              share_bps:
                type: integer
            required: [asset_class, value_centavos, share_bps]
        fii_sectors:
          type: array
          description: Current-value share per FII sector, as a fraction of the FII total.
          items:
            type: object
            properties:
              sector:
                type: string
              value_centavos:
                type: integer
                format: int64
              share_bps:
                type: integer
            required: [sector, value_centavos, share_bps]
        stale_tickers:
          type: array
          description: Held FIIs with no current quote, valued at cost basis.
          items:
            type: string
      required: [summary, allocation, fii_sectors, stale_tickers]
    FixedIncomeRequest:
      type: object
      properties:
        name:
          type: string
        institution:
          type: string
        invested_amount_centavos:
          type: integer
          format: int64
          minimum: 1
          description: Invested amount in centavos (integer, never a float).
        annual_rate_bps:
          type: integer
          minimum: 0
          description: Annual rate in basis points (1 bp = 0.01%).
        maturity_date:
          type: [string, "null"]
          format: date
          description: Maturity as `YYYY-MM-DD`; null/omitted for daily-liquidity holdings.
        liquidity_type:
          type: string
          enum: [daily, at_maturity]
      required: [name, institution, invested_amount_centavos, annual_rate_bps, liquidity_type]
    FixedIncomeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        institution:
          type: string
        invested_amount_centavos:
          type: integer
          format: int64
        annual_rate_bps:
          type: integer
        maturity_date:
          type: [string, "null"]
          format: date
        liquidity_type:
          type: string
          enum: [daily, at_maturity]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required: [id, name, institution, invested_amount_centavos, annual_rate_bps, liquidity_type, created_at, updated_at]
security:
  - cookieAuth: []
